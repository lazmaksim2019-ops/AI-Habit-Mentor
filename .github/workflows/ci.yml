name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run Ruff
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run mypy
        run: mypy app/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Set environment variables
        run: |
          echo "DATABASE_URL=postgresql+asyncpg://test:test@localhost:5432/test" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=test-key" >> $GITHUB_ENV
          echo "GEMINI_MODEL=gemini-3.1-flash-lite" >> $GITHUB_ENV
          echo "GEMINI_EMBEDDING_MODEL=text-embedding-004" >> $GITHUB_ENV

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U test && break
            sleep 1
          done

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=. --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          GEMINI_API_KEY: test-key
          GEMINI_MODEL: gemini-3.1-flash-lite
          GEMINI_EMBEDDING_MODEL: text-embedding-004

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-habit-mentor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max