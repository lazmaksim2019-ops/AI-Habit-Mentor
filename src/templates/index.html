<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        telegram: '#0088cc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white">
    <div class="max-w-lg mx-auto px-4 py-8">
        <div id="app" class="space-y-6">

            <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-purple-500 to-telegram flex items-center justify-center shadow-lg shadow-purple-500/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-300 to-blue-300 bg-clip-text text-transparent">
                    Neuro-Adaptive AI Habit Mentor
                </h1>
                <p class="text-sm text-gray-400 mt-1">Твой персональный AI-трекер привычек</p>
            </div>

            <div id="user-card" class="bg-white/5 backdrop-blur-sm rounded-2xl p-5 border border-white/10">
                <div class="flex items-center gap-4">
                    <div id="avatar" class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center text-lg font-bold shrink-0">
                        ?
                    </div>
                    <div>
                        <p id="greeting" class="text-lg font-semibold">Загрузка...</p>
                        <p id="context-info" class="text-sm text-gray-400">Определяем окружение...</p>
                    </div>
                </div>
            </div>

            <div id="habits-preview" class="bg-white/5 backdrop-blur-sm rounded-2xl p-5 border border-white/10">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-4">Сегодняшние привычки</h2>
                <div class="space-y-3">
                    <div class="flex items-center gap-3 p-3 rounded-xl bg-white/5 hover:bg-white/10 transition">
                        <div class="w-6 h-6 rounded-full border-2 border-gray-500 flex items-center justify-center">
                            <div class="w-3 h-3 rounded-full bg-transparent"></div>
                        </div>
                        <span class="text-sm text-gray-300">Зарядка 15 минут</span>
                    </div>
                    <div class="flex items-center gap-3 p-3 rounded-xl bg-white/5 hover:bg-white/10 transition">
                        <div class="w-6 h-6 rounded-full border-2 border-gray-500 flex items-center justify-center">
                            <div class="w-3 h-3 rounded-full bg-transparent"></div>
                        </div>
                        <span class="text-sm text-gray-300">Прочитать 10 страниц</span>
                    </div>
                    <div class="flex items-center gap-3 p-3 rounded-xl bg-white/5 hover:bg-white/10 transition">
                        <div class="w-6 h-6 rounded-full border-2 border-gray-500 flex items-center justify-center">
                            <div class="w-3 h-3 rounded-full bg-transparent"></div>
                        </div>
                        <span class="text-sm text-gray-300">Медитация 5 минут</span>
                    </div>
                </div>
            </div>

            <button id="check-api"
                    class="w-full py-3 px-6 rounded-xl bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 font-semibold transition-all duration-200 active:scale-95 shadow-lg shadow-purple-500/20">
                Проверить связь с API
            </button>

            <div id="api-result" class="hidden text-center text-sm text-gray-400"></div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const tg = window.Telegram?.WebApp;
            const avatarEl = document.getElementById('avatar');
            const greetingEl = document.getElementById('greeting');
            const contextInfoEl = document.getElementById('context-info');
            const checkApiBtn = document.getElementById('check-api');
            const apiResultEl = document.getElementById('api-result');

            if (tg) {
                tg.ready();
                tg.expand();

                const user = tg.initDataUnsafe?.user;
                if (user) {
                    const name = user.first_name || '';
                    const lastName = user.last_name || '';
                    const fullName = [name, lastName].filter(Boolean).join(' ');
                    const username = user.username ? '@' + user.username : '';

                    avatarEl.textContent = (name[0] || '?').toUpperCase();
                    avatarEl.style.background = 'linear-gradient(135deg, #0088cc, #5b9bd5)';
                    greetingEl.textContent = 'Привет, ' + fullName + '!';
                    contextInfoEl.textContent = username
                        ? 'Telegram • ' + username
                        : 'Telegram Mini App';
                } else {
                    avatarEl.textContent = 'TG';
                    greetingEl.textContent = 'Привет, пользователь Telegram!';
                    contextInfoEl.textContent = 'Telegram Mini App';
                }
            } else {
                avatarEl.textContent = 'WB';
                greetingEl.textContent = 'Привет, Гость!';
                contextInfoEl.textContent = 'Веб-версия • нет данных Telegram';
            }

            checkApiBtn.addEventListener('click', async function () {
                checkApiBtn.disabled = true;
                checkApiBtn.textContent = 'Проверка...';
                apiResultEl.classList.remove('hidden');
                apiResultEl.textContent = 'Подключаюсь к серверу...';

                try {
                    const res = await fetch('/health');
                    const data = await res.json();
                    apiResultEl.textContent = '✅ Сервер ответил: ' + JSON.stringify(data);
                    apiResultEl.className = 'text-center text-sm text-green-400';
                } catch (err) {
                    apiResultEl.textContent = '❌ Ошибка соединения: ' + err.message;
                    apiResultEl.className = 'text-center text-sm text-red-400';
                } finally {
                    checkApiBtn.disabled = false;
                    checkApiBtn.textContent = 'Проверить связь с API';
                }
            });
        });
    </script>
</body>
</html>
